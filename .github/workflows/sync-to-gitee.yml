name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://inobit:${{ secrets.GITEE_TOKEN }}@gitee.com/inobit/llm.nvim.git
          git push gitee main:main || git push gitee main:main --force
          git push gitee --tags || git push gitee --tags --force
